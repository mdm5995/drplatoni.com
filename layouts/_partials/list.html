<section>
	<header>
		<h2>{{ .Title }}</h2>
		{{ with .Params.subtitle }}
		<p>{{ . }}</p>
		{{ end }}
	</header>
	{{ .Content }}
	{{ if .Pages }}
	<ul>
		{{ range .Pages }}
		<li>
			{{ partial "post-item.html" . }}
		</li>
		{{ end }}
	</ul>
	{{ else }}
	<p>No content found.</p>
	{{ end }}
</section>
