<nav>
	<a href='{{ "/" | relLangURL }}'>
		<h1>Dr. Kathy Platoni</h1>
	</a>

	<div>
		<a href='{{ "/about/" | relLangURL }}'>About</a>
		{{ range site.Sections }}
		<a href="{{ .RelPermalink }}">{{ .Title }}</a>
		{{ end }}
		{{ range site.Data.featured_tags }}
		{{ $item := . }}
		<a href="/tags/{{ urlize $item.tag }}">
			{{ $item.tag | humanize | title }}
		</a>
		{{ end }}
	</div>
</nav>
